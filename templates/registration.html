{% extends "base.html" %}
{% block title %}Join S.H.E.L.F.{% endblock %}
{% block content %}
<section class="shelf-page-head">
  <h1 class="shelf-page-title">Create your shelf</h1>
  <p class="shelf-page-lead">Pick a display name, email, and password. You will use your email to sign in.</p>
</section>

<div class="shelf-card shelf-card--narrow">
  <form action="{{ url_for('main.register') }}" method="post" class="shelf-form" autocomplete="on">
    <div class="shelf-field">
      <label for="name">Display name</label>
      <input type="text" name="name" id="name" required placeholder="How we greet you">
    </div>
    <div class="shelf-field">
      <label for="email">Email</label>
      <input type="email" name="email" id="email" required placeholder="you@example.com">
    </div>
    <div class="shelf-field">
      <label for="password">Password</label>
      <input type="password" name="password" id="password" required minlength="6" placeholder="At least 6 characters">
    </div>
    <button type="submit" class="shelf-btn shelf-btn--primary">Create account</button>
  </form>
  <p class="shelf-muted">
    Already have an account? <a href="{{ url_for('landing_page') }}">Back to sign in</a>
  </p>
</div>
{% endblock %}
