<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header class="main-header">
        <a href="">Home</a>
        <a href="">Books</a>
        <a href="">Sign In</a>
        <a href="">Sign Up</a>
    </header>

   <div class = "table">
    <table>
        <tr>
            <th>Title</th>
            <th>Author</th>
            <th>Genre</th>
            <th>Year Published</th>
            <th>Pages</th>
            <th>ISBN</th>
        </tr>
        {% for book in books %}
        <tr>
            <td>{{ book.title }}</td>
            <td>{{ book.author }}</td>
            <td>{{ book.genre }}</td>
            <td>{{ book.year_published }}</td>
            <td>{{ book.pages }}</td>
            <td>{{ book.isbn }}</td>
        </tr>
        {% endfor %}
    </table>
   </div>
</body>
</html>
